@if (store.loading()) {
  <mat-spinner diameter="40"></mat-spinner>
}
@if (store.error()) {
  <mat-error>{{ store.error() }}</mat-error>
}
<table mat-table [dataSource]="store.emergencies()" class="mat-elevation-z8">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let emergency"> {{ emergency.id }} </td>
  </ng-container>

  <ng-container matColumnDef="pacienteNombre">
    <th mat-header-cell *matHeaderCellDef> Paciente </th>
    <td mat-cell *matCellDef="let emergency"> {{ emergency.pacienteNombre }} </td>
  </ng-container>

  <ng-container matColumnDef="descripcion">
    <th mat-header-cell *matHeaderCellDef> Descripción </th>
    <td mat-cell *matCellDef="let emergency"> {{ emergency.descripcion }} </td>
  </ng-container>

  <ng-container matColumnDef="nivelCriticidad">
    <th mat-header-cell *matHeaderCellDef> Nivel </th>
    <td mat-cell *matCellDef="let emergency"> {{ emergency.nivelCriticidad }} </td>
  </ng-container>

  <ng-container matColumnDef="estadoEmergencia">
    <th mat-header-cell *matHeaderCellDef> Estado </th>
    <td mat-cell *matCellDef="let emergency"> {{ emergency.estadoEmergencia }} </td>
  </ng-container>

  <ng-container matColumnDef="fechaActivacion">
    <th mat-header-cell *matHeaderCellDef> Fecha </th>
    <td mat-cell *matCellDef="let emergency"> {{ emergency.fechaActivacion }} </td>
  </ng-container>

  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef> Acciones </th>
    <td mat-cell *matCellDef="let emergency">
      <button mat-button (click)="editEmergency(emergency.id)">Editar</button>
      <button mat-button (click)="deleteEmergency(emergency.id)">Eliminar</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<button mat-raised-button color="primary" (click)="router.navigate(['/app', 'emergency', 'emergencies', 'new'])">
  Reportar Emergencia
</button>
