<div class="detail-container">

  <section class="product-image-section">

    <img
      [src]="product().image"
      [alt]="product().title">

  </section>

  <section class="detail-content">

    <span class="category">
      {{ product().category }}
    </span>

    <h1>
      {{ product().title }}
    </h1>

    <p class="description">
      {{ product().description }}
    </p>

    <div class="detail-meta">

      <div class="meta-item">
        <span class="label">Rating</span>
        <span class="value">
          ⭐ {{ product().rating }}
        </span>
      </div>

      <div class="meta-item">
        <span class="label">Availability</span>
        <span
          class="availability"
          [class.available]="availability() === 'Available'"
          [class.out-stock]="availability() === 'Out of Stock'">

          {{ availability() }}

        </span>
      </div>

      <div class="meta-item">
        <span class="label">Stock</span>
        <span class="value">
          {{ product().stock }} units
        </span>
      </div>

    </div>

    <div class="price-section">

      <h2>
        ${{ product().price }}
      </h2>

      <p>One-time purchase</p>

    </div>

    <div class="action-buttons">

      <button class="primary-button">
        Add to Cart
      </button>

      <button class="secondary-button">
        Save Product
      </button>

    </div>

  </section>

</div>
