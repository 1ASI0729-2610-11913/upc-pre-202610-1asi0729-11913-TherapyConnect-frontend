<section class="tc-welcome" aria-labelledby="tc-welcome-heading">
  <h1 id="tc-welcome-heading" class="tc-welcome-greeting">
    <span class="tc-welcome-salute">{{ greetingKey() | translate }}</span>
    <span class="tc-welcome-name">, {{ displayName() }}</span>
  </h1>
  <p class="tc-welcome-role">{{ roleLineKey() | translate }}</p>
  <p class="tc-welcome-desc">{{ 'dashboard.homeSubtitle' | translate }}</p>
</section>
